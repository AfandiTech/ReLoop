<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReLoop | Circular Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <section class="relative py-32 bg-slate-900 text-white text-center">
        <h1 class="text-6xl font-extrabold mb-6">Giving Technology <span class="text-emerald-400">A Second Life</span></h1>
        <p class="text-xl text-slate-300 max-w-2xl mx-auto mb-10">The premier certified circular marketplace and refurbishment network.</p>
    </section>

    <section class="py-20 max-w-7xl mx-auto px-6">
        <h2 class="text-4xl font-extrabold text-center mb-16">Our Products</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl border overflow-hidden shadow-lg">
                <img src="pc.jpg" alt="PC" class="w-full h-48 object-cover">
                <div class="p-8"><h4 class="text-xl font-bold">Laptops & Workstations</h4></div>
            </div>
            <div class="bg-white rounded-3xl border overflow-hidden shadow-lg">
                <img src="mobilephones.jpeg" alt="Smartphones" class="w-full h-48 object-cover">
                <div class="p-8"><h4 class="text-xl font-bold">Smartphones</h4></div>
            </div>
            <div class="bg-white rounded-3xl border overflow-hidden shadow-lg">
                <img src="tabblet.jpeg" alt="Tablets" class="w-full h-48 object-cover">
                <div class="p-8"><h4 class="text-xl font-bold">Tablets & Gadgets</h4></div>
            </div>
        </div>
    </section>

    <section class="py-20 bg-slate-900 text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h3 class="text-4xl font-extrabold mb-12">Post-Funding Equity Structure</h3>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700">
                    <h4 class="text-xl font-bold mb-4">Founders</h4>
                    <span class="text-5xl font-black text-emerald-400">60%</span>
                </div>
                <div class="bg-emerald-600 p-8 rounded-3xl shadow-xl">
                    <h4 class="text-xl font-bold mb-4">New Investors</h4>
                    <span class="text-5xl font-black text-white">40%</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Mahmoud Afandi Technology FZCO. All rights reserved.</p>
    </footer>

</body>
</html>
