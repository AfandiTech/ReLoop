<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReLoop | By Afandi Technology FZCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .scroll-reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .animate-fade-in-up { opacity: 1; transform: translateY(0); }
        .hero-zoom { animation: zoomEffect 20s infinite alternate; }
        @keyframes zoomEffect { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="h-10 w-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-recycle"></i></div>
                <span class="text-xl font-black tracking-tight">ReLoop By AfandiTech</span>
            </div>
            <div class="hidden md:flex items-center gap-6 text-sm font-semibold text-slate-600">
                <a href="#about" class="hover:text-emerald-600">About</a>
                <a href="#products" class="hover:text-emerald-600">Products</a>
                <a href="#goals" class="hover:text-emerald-600">Future Goals</a>
            </div>
        </nav>
    </header>

    <section class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0"><img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2000" class="hero-zoom w-full h-full object-cover"><div class="absolute inset-0 bg-slate-900/70"></div></div>
        <div class="relative z-10 text-center text-white px-6">
            <h1 class="text-6xl font-extrabold mb-6">Giving Technology <span class="text-emerald-400">A Second Life</span></h1>
            <p class="text-xl text-slate-200 mb-10">Mahmoud Afandi Technology FZCO</p>
            <a href="#products" class="bg-emerald-600 px-10 py-4 rounded-full font-bold hover:bg-emerald-500">Explore Products</a>
        </div>
    </section>

    <section id="products" class="py-20 bg-slate-50 scroll-reveal">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-extrabold mb-16">Our Inventory</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-white rounded-3xl border p-8 cursor-pointer hover:shadow-xl transition" onclick="openModal('Smartphones')">
                    <i class="fa-solid fa-mobile-screen text-5xl text-emerald-600 mb-4"></i>
                    <h4 class="text-xl font-bold">Smartphones</h4>
                </div>
                <div class="bg-white rounded-3xl border p-8 cursor-pointer hover:shadow-xl transition" onclick="openModal('Laptops')">
                    <i class="fa-solid fa-laptop text-5xl text-emerald-600 mb-4"></i>
                    <h4 class="text-xl font-bold">Laptops</h4>
                </div>
                <div class="bg-white rounded-3xl border p-8 cursor-pointer hover:shadow-xl transition" onclick="openModal('Tablets')">
                    <i class="fa-solid fa-tablet-screen-button text-5xl text-emerald-600 mb-4"></i>
                    <h4 class="text-xl font-bold">Tablets</h4>
                </div>
            </div>
        </div>
    </section>

    <div id="productModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-5xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-white">
                <h3 id="modalTitle" class="text-2xl font-bold text-emerald-700">Inventory</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl font-bold">✕</button>
            </div>
            <div class="overflow-y-auto p-6">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100">
                        <tr>
                            <th class="p-3 border">ID</th>
                            <th class="p-3 border">Name</th>
                            <th class="p-3 border">Qty</th>
                            <th class="p-3 border">Storage</th>
                            <th class="p-3 border">Grade</th>
                            <th class="p-3 border">Battery</th>
                        </tr>
                    </thead>
                    <tbody id="modalContent" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // دمج بياناتك الحقيقية هنا
        const inventoryData = {
            'Smartphones': [
                {id: 'A3256', name: 'iPhone 17 Pro 256GB', qty: 15, storage: '256GB', grade: 'A', battery: '100%'},
                {id: 'A3212', name: 'iPhone 16e 128GB', qty: 10, storage: '128GB', grade: 'A', battery: '100%'},
                {id: 'MG6K3', name: 'iPhone 12 Mini 64GB', qty: 50, storage: '64GB', grade: 'B', battery: '78%'},
                {id: 'MWKM2', name: 'iPhone 11 64GB', qty: 300, storage: '64GB', grade: 'C', battery: '80%'}
            ],
            'Laptops': [{id: 'LT01', name: 'MacBook Pro', qty: 5, storage: '512GB', grade: 'A', battery: '95%'}],
            'Tablets': [{id: 'TB01', name: 'iPad Air', qty: 10, storage: '128GB', grade: 'A', battery: '90%'}]
        };

        function openModal(cat) {
            document.getElementById('modalTitle').innerText = cat + " Stock";
            let tbody = document.getElementById('modalContent');
            tbody.innerHTML = '';
            inventoryData[cat].forEach(item => {
                tbody.innerHTML += `<tr class="hover:bg-slate-50">
                    <td class="p-3 border">${item.id}</td>
                    <td class="p-3 border font-bold">${item.name}</td>
                    <td class="p-3 border">${item.qty}</td>
                    <td class="p-3 border">${item.storage}</td>
                    <td class="p-3 border">${item.grade}</td>
                    <td class="p-3 border">${item.battery}</td>
                </tr>`;
            });
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('productModal').classList.add('flex');
        }
        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.getElementById('productModal').classList.remove('flex');
        }
        // Animations
        const observer = new IntersectionObserver((e) => { e.forEach(i => { if(i.isIntersecting) i.target.classList.add('animate-fade-in-up'); })});
        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
